<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Me-Wall Genesis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Me-Wall</h1>
      <p>Every life has a story. This is yours.</p>
    </header>

    <section id="wall" class="wall" aria-label="Home Wall"></section>

    <section id="yearView" class="year-view hidden">
      <button id="backButton" class="back-button">← Back to wall</button>
      <h2 id="yearTitle"></h2>
      <p id="yearPrompt"></p>

      <div class="memory-box">
        <label for="memoryInput">What comes to mind?</label>
        <textarea id="memoryInput" rows="7" placeholder="Tell this year a memory..."></textarea>
        <button id="keepMemoryButton" class="keep-button">Keep this memory</button>
      </div>

      <div id="memoryList" class="memory-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
