<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Me-Wall Genesis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Me-Wall</h1>
      <p>Every life has a story. This is yours.</p>
    </header>

    <section id="setupView" class="setup-view hidden">
      <h2>Begin your Me-Wall</h2>
      <p>What year were you born?</p>
      <input id="birthYearInput" type="number" placeholder="1959" />
      <button id="startButton" class="keep-button">Begin</button>
    </section>

    <section id="wall" class="wall hidden" aria-label="Home Wall"></section>

    <section id="yearView" class="year-view hidden">
      <button id="backButton" class="back-button">← Home Wall</button>

      <div class="year-heading">
        <h2 id="yearTitle"></h2>
        <p id="yearAge"></p>
      </div>

      <div class="year-invitation">
        <p>Every year has a story.</p>
        <p>What do you remember about this year?</p>
      </div>

      <section class="memories-section">
        <h3>Memories</h3>
        <div id="emptyYear" class="empty-year hidden">
          <p>Nothing has been remembered from this year yet.</p>
          <p>Take your time.</p>
        </div>
        <div id="memoryList" class="memory-list"></div>
      </section>

      <button id="showEditorButton" class="keep-button">Record another memory</button>

<div id="memoryEditor" class="memory-box hidden">
  <label for="memoryInput">Tell this year about something you remember...</label>

  <div class="voice-actions">
    <button id="speakButton" class="voice-button">🎙️ Speak memory</button>
    <button id="stopSpeakingButton" class="voice-button hidden">Stop listening</button>
    <span id="listeningStatus" class="listening-status hidden">I'm listening...</span>
  </div>

  <textarea id="memoryInput" rows="7"></textarea>

  <div class="editor-actions">
    <button id="keepMemoryButton" class="keep-button">Record memory</button>
    <button id="cancelMemoryButton" class="cancel-button">Cancel</button>
  </div>
</div>
    </section>

    <footer id="lifeTools" class="life-tools hidden">
      <button id="exportButton">Export my life</button>
      <label for="importInput" class="import-label">Import my life</label>
      <input id="importInput" type="file" accept="application/json" hidden />
      <button id="resetButton">Start again</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
